<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习成长小镇</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone town-page" aria-label="学习成长小镇">
      <section class="town-hero">
        <div class="statusbar town-status">
          <span class="status-time">14:38</span>
          <span class="status-icons" aria-label="蜂窝网络、5G、电池状态">
            <span class="cellular" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
            <span class="network-text">5G</span>
            <span class="battery" aria-hidden="true"></span>
          </span>
        </div>
        <img class="town-pear" src="./assets/hero-mascot-layer.png" alt="" aria-hidden="true" />
        <div class="town-title">
          <h1>学习成长小镇<span></span></h1>
          <p>每天进步一点点，收获满满成长能量</p>
        </div>
      </section>

      <section class="town-card">
        <header class="progress-head">
          <h2>本周学习进度</h2>
          <div><strong>第1周</strong><span>04.20-04.26</span></div>
        </header>
        <div class="progress-row">
          <div class="progress-track"><span style="width: 60%"></span></div>
          <strong class="progress-percent">60%</strong>
          <div class="score"><span>★</span><strong>60</strong><em>/100</em></div>
        </div>

        <div class="map-stage">
          <img src="./assets/town-map-panel.png" alt="学习成长小镇地图" />
        </div>

        <footer class="reward-row">
          <p>完成当前关卡可获得</p>
          <span class="reward-star">★</span><strong>+10</strong>
          <span class="reward-book"></span><strong>+1</strong>
          <button type="button">继续学习</button>
        </footer>
      </section>

      <nav class="tabbar town-tabbar" aria-label="底部导航">
        <a href="./index.html"><span class="tab-icon plan"></span>计划</a>
        <a href="#"><span class="tab-icon word">A</span>单词</a>
        <a class="read-tab active" href="./town.html"><span class="mascot"></span>阅读</a>
        <a href="#"><span class="tab-icon speak"></span>口语</a>
        <a href="#"><span class="tab-icon mine"></span>我的</a>
      </nav>
    </main>
  </body>
</html>
