<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>悦读小达人 - Frame 40</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260722c" />
    <script src="./audio-manager.js" defer></script>
  </head>
  <body>
    <main class="phone" aria-label="悦读小达人首页 Frame 40">
      <section class="hero" aria-label="学习概览">
        <img class="hero-art" src="./assets/frame40/hero-lanhu-game-entry.png" alt="" aria-hidden="true" />
        <img class="hero-mask" src="./assets/frame40/hero-lanhu-map-transition-mask.png" alt="" aria-hidden="true" />
        <img class="hero-mask hero-mask-lower" src="./assets/frame40/hero-lanhu-map-lower-transition.png" alt="" aria-hidden="true" />
        <img class="hero-ip-art" src="./assets/frame40/entrance-attracts-ip.png" alt="" aria-hidden="true" />
        <a class="hero-ip" href="./level-map.html?v=20260722" data-audio="entrance-enter" aria-label="进入关卡地图"></a>

        <div class="statusbar" aria-label="状态栏">
          <span class="status-time">9:41</span>
          <span class="status-icons" aria-hidden="true">
            <span class="cellular"><i></i><i></i><i></i><i></i></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </span>
        </div>

        <header class="profile" data-home-transition-piece>
          <div class="name-row">
            <h1>Hi~Nicole</h1>
            <button class="level-link" type="button">阅读进阶者</button>
          </div>
          <p class="streak">已坚持<span>300</span>天</p>
        </header>
      </section>

      <section class="weekly" aria-label="本周学习" data-home-transition-piece>
        <img src="./assets/frame40/weekly-147-1455-export-clean.png" alt="本周学习，04.20-04.26，第1周。阅读篇数15篇，阅读时间48分，学习词汇20个。" />
        <div class="sr-only">
          <h2>本周学习</h2>
          <p>04.20-04.26，第1周</p>
          <p>周一和周二已完成，周三未完成，周四是今天。</p>
          <p>阅读篇数15篇，阅读时间48分，学习词汇20个。</p>
        </div>
      </section>

      <section class="reading-card" aria-label="今日阅读计划" data-home-transition-piece>
        <section class="today">
          <h2>今日阅读计划<span class="sparkles" aria-hidden="true"></span></h2>
          <article class="main-book">
            <div class="cover-stand">
              <img src="./assets/frame40/content-raw-03.png" alt="The Three Little Pigs 封面" />
            </div>
            <div class="book-copy">
              <h3>The Three Little Pigs</h3>
              <p>
                <span class="ico book"></span>绘本
                <span class="vline"></span>
                <span class="ico clock"></span>5分钟
                <span class="vline"></span>
                <span class="ico mic"></span>1个句子
              </p>
              <button type="button">开始学习</button>
            </div>
          </article>
        </section>

        <section class="supplement" aria-label="补充阅读">
          <div class="section-head">
            <h2>补充阅读</h2>
            <button type="button">换一换</button>
          </div>
          <div class="book-row">
            <article class="mini-book">
              <span class="new">NEW</span>
              <img src="./assets/frame40/content-raw-02.png" alt="Pig and Dog 封面" />
              <strong>Pig and Dog</strong>
              <small>绘本</small>
            </article>
            <article class="mini-book">
              <img src="./assets/frame40/content-raw-05.png" alt="Butterfly 封面" />
              <strong>Butterfly</strong>
              <small>动画</small>
            </article>
            <article class="mini-book">
              <img src="./assets/frame40/content-raw-04.png" alt="The Fox 封面" />
              <strong>The Fox</strong>
              <small>文章</small>
            </article>
          </div>
        </section>
      </section>

      <section class="next-plan" aria-label="接下来计划" data-home-transition-piece>
        <h2>接下来计划</h2>
        <div class="timeline">
          <article class="locked-card">
            <div class="pin"></div>
            <h3>明天</h3>
            <div class="future-book">
              <img src="./assets/frame40/content-raw-08.png" alt="Pig and Dog 封面" />
              <div>
                <h4>Pig and Dog</h4>
                <p>
                  <span class="ico book"></span>绘本
                  <span class="vline"></span>
                  <span class="ico clock"></span>5分钟
                  <span class="vline"></span>
                  <span class="ico mic"></span>1个句子
                </p>
                <button type="button" disabled>明天解锁</button>
              </div>
            </div>
          </article>

          <article class="locked-card">
            <div class="pin"></div>
            <h3>后天</h3>
            <div class="future-book">
              <img src="./assets/frame40/content-raw-10.png" alt="Summer 封面" />
              <div>
                <h4>Summer</h4>
                <p>
                  <span class="ico book"></span>绘本
                  <span class="vline"></span>
                  <span class="ico clock"></span>5分钟
                  <span class="vline"></span>
                  <span class="ico mic"></span>1个句子
                </p>
                <button type="button" disabled>后天解锁</button>
              </div>
            </div>
          </article>
        </div>
      </section>

      <nav class="tabbar" aria-label="底部导航" data-home-transition-piece>
        <img src="./assets/frame40/tab-150-2055-export-clean.png" alt="阅读、单词卡、学习、口语、我的" />
      </nav>

      <div class="home-map-transition" aria-hidden="true">
        <img class="transition-map-base" src="./assets/map-transition-base-lanhu.png" alt="" />
        <div class="transition-map-ui">
          <div class="statusbar transition-map-statusbar">
            <span class="status-time">9:41</span>
            <span class="status-icons">
              <span class="cellular"><i></i><i></i><i></i><i></i></span>
              <span class="wifi"></span>
              <span class="battery"></span>
            </span>
          </div>
          <img class="transition-map-ui-back" src="./assets/map-ui-back-lanhu.png" alt="" />
          <img class="transition-map-ui-title" src="./assets/map-ui-title-lanhu.png" alt="" />
          <div class="transition-map-ui-stat transition-map-ui-stars">
            <img class="transition-map-ui-panel" src="./assets/map-ui-star-panel-lanhu.png" alt="" />
            <img class="transition-map-ui-icon" src="./assets/map-ui-star-lanhu.png" alt="" />
            <span><strong>60</strong><small>/100</small></span>
          </div>
          <div class="transition-map-ui-stat transition-map-ui-achievement">
            <img class="transition-map-ui-panel" src="./assets/map-ui-achievement-panel-lanhu.png" alt="" />
            <img class="transition-map-ui-icon" src="./assets/map-ui-achievement-medal-lanhu.png" alt="" />
            <span>成就</span>
          </div>
        </div>
        <img class="transition-map-house" src="./assets/map-house.png" alt="" />
        <div class="transition-focus-mask"></div>
        <img class="transition-map-cloud" src="./assets/map-cloud-overlay.png" alt="" />
        <img class="transition-map-preview" src="./assets/map-final-lanhu.png" alt="" />
      </div>
    </main>
    <script src="./home-map-transition.js?v=20260722b" defer></script>
  </body>
</html>
