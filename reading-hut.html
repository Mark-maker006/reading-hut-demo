<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Hut</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="./assets/placement-smoke.webp" as="image" type="image/webp" />
    <link rel="stylesheet" href="./reading-hut.css" />
    <script src="./audio-manager.js" defer></script>
  </head>
  <body data-audio-bgm="reading-hut-bgm">
    <main class="hut-page" aria-label="Reading Hut">
      <img class="room-bg" src="./assets/reading-room-background.png" alt="" aria-hidden="true" />

      <section class="placement-stage" aria-label="Furniture placement preview">
        <div class="placement-slot ghost-slot ghost-floor-overlay" data-slot="floor" data-item-id="wood-floor" aria-hidden="true">
          <img class="placement-ghost" src="./assets/hut-ghost-floor.svg" alt="" />
        </div>
        <div class="placement-slot ghost-slot ghost-bookshelf-slot" data-slot="bookshelf" data-item-id="bookshelf" aria-hidden="true">
          <img class="placement-ghost placement-bookshelf-ghost" src="./assets/hut-ghost-bookshelf.png" alt="" />
          <img class="placement-item placement-bookshelf-item" src="./assets/bag-bookshelf.png" alt="" />
        </div>
        <div class="placement-slot ghost-slot ghost-rug-slot" data-slot="rug" data-item-id="reading-rug" aria-hidden="true">
          <img class="placement-ghost ghost-rug-item" src="./assets/item-reading-rug-off.png" alt="" />
          <img class="placement-ghost ghost-rug-outline" src="./assets/hut-ghost-rug-outline.svg" alt="" />
          <img class="placement-item placement-rug-item" src="./assets/item-reading-rug-on.png" alt="" />
        </div>
        <div class="placement-slot ghost-slot ghost-plant-slot" data-slot="plant" data-item-id="plant" aria-hidden="true">
          <img class="placement-ghost ghost-plant-item" src="./assets/item-plant-off.png" alt="" />
          <img class="placement-ghost ghost-plant-outline" src="./assets/hut-ghost-plant-outline.svg" alt="" />
          <img class="placement-item placement-plant-item" src="./assets/item-plant-on.png" alt="" />
        </div>
        <div class="placement-slot ghost-slot ghost-doll-slot" data-slot="doll" data-item-id="doll" aria-hidden="true">
          <img class="placement-ghost placement-doll-ghost" src="./assets/hut-ghost-doll-off.png" alt="" />
          <img class="placement-item placement-doll-item" src="./assets/item-doll-on.png" alt="" />
        </div>
        <div class="placement-slot ghost-slot ghost-story-wall-slot" data-slot="story-wall" data-item-id="story-wall" aria-hidden="true">
          <img class="placement-ghost placement-story-wall-ghost" src="./assets/hut-ghost-story-wall-off.png" alt="" />
          <img class="placement-item placement-story-wall-item" src="./assets/item-story-wall-on.png" alt="" />
        </div>
        <div class="placement-slot ghost-slot ghost-star-sticker-slot" data-slot="star-sticker" data-item-id="star-sticker" aria-hidden="true">
          <img class="placement-ghost ghost-star-sticker-item" src="./assets/item-star-sticker-off.png" alt="" />
          <img class="placement-ghost ghost-star-sticker-outline" src="./assets/hut-ghost-star-sticker-outline.svg" alt="" />
          <img class="placement-item placement-star-sticker-item" src="./assets/item-star-sticker-on.png" alt="" />
        </div>
        <a class="placement-hotspot" aria-label="Furniture placement area"></a>
      </section>

      <header class="room-topbar" aria-label="Room navigation">
        <a class="room-back" href="./level-map.html" aria-label="Back to level map">
          <img src="./assets/room-back-button.png" alt="" aria-hidden="true" />
        </a>
        <img class="room-nameplate" src="./assets/room-nameplate.png" alt="Reading Hut" />
        <div class="room-stars" role="img" aria-label="500 stars">
          <span class="room-star-count" aria-hidden="true">500</span>
          <img class="room-star-icon" src="./assets/room-star-icon.svg" alt="" aria-hidden="true" />
          <img class="room-star-plus" src="./assets/room-star-plus.png" alt="" aria-hidden="true" />
        </div>
      </header>

      <div class="room-tip" aria-label="引导提示">快点击背包来放置你收集的家具吧~~！</div>
      <div class="study-tip" aria-label="学习提示" aria-hidden="true">快去完成今天的学习任务吧！加油哦～</div>
      <div class="exchange-success-tip" aria-label="兑换成功提示" aria-hidden="true"></div>
      <img class="room-mascot" src="./assets/hut-mascot.png" alt="" aria-hidden="true" />

      <nav class="room-bottom-actions" aria-label="Room actions">
        <button class="room-action room-action-bag" type="button" data-audio="hut-item-click" aria-label="Open bag">
          <img src="./assets/room-button-bag.png" alt="" aria-hidden="true" />
          <span class="room-action-label">家具</span>
        </button>
        <button class="room-action room-action-decorations" type="button" data-audio="hut-item-click" aria-label="Open decorations bag">
          <img src="./assets/room-button-decorations-bag.png" alt="" aria-hidden="true" />
          <span class="room-action-label">装饰</span>
        </button>
        <a class="room-action room-action-catalog" href="./illustration-book.html" aria-label="Open catalog">
          <img src="./assets/room-button-catalog.png" alt="" aria-hidden="true" />
          <span class="room-action-label">图鉴</span>
        </a>
      </nav>

      <!-- bag panel (inline, animated) -->
      <div class="bag-overlay" aria-hidden="true"></div>
      <section class="bag-panel" aria-label="Furniture list" aria-hidden="true">
        <img class="bag-panel-bg" src="./assets/bag-panel-furniture.png" alt="" aria-hidden="true" />
        <div class="bag-item-list" role="list"></div>
        <button class="bag-close" type="button" data-audio="hut-item-click" aria-label="关闭面板"></button>
      </section>

      <div class="placement-motion-layer" aria-hidden="true">
        <svg class="placement-flight-trail" aria-hidden="true">
          <path class="placement-flight-path"></path>
        </svg>
        <canvas class="placement-particle-canvas" aria-hidden="true"></canvas>
        <div class="placement-smoke-layer" aria-hidden="true"></div>
      </div>

      <div class="exchange-overlay" aria-hidden="true">
        <section class="exchange-dialog" role="dialog" data-mode="sufficient" aria-modal="true" aria-label="星星兑换">
          <div class="exchange-dialog-bg" aria-hidden="true">
            <img src="./assets/exchange-dialog-source.png" alt="" />
          </div>

          <div class="exchange-mode exchange-mode-sufficient">
            <h2 class="exchange-sufficient-title">兑换<span class="exchange-item-name">阅读地毯</span>吗？</h2>
            <div class="exchange-preview exchange-sufficient-preview">
              <img class="exchange-preview-image" src="./assets/item-reading-rug-on.png" alt="" />
            </div>
            <div class="exchange-details exchange-sufficient-details">
              <div class="exchange-detail-row exchange-price-row">
                <span class="exchange-detail-label exchange-price-label">
                  <img src="./assets/exchange-dialog-star.svg" alt="" aria-hidden="true" />
                  <span>价格</span>
                </span>
                <strong class="exchange-number exchange-price-value">10</strong>
              </div>
              <div class="exchange-detail-row exchange-balance-row">
                <span class="exchange-detail-label">当前有</span>
                <span class="exchange-balance-group">
                  <strong class="exchange-number exchange-balance-value">500</strong>
                  <span>颗星星</span>
                </span>
              </div>
              <div class="exchange-detail-row exchange-remaining-row">
                <span class="exchange-detail-label">兑换后剩余</span>
                <strong class="exchange-number exchange-remaining-value">490</strong>
                <span>颗星星</span>
              </div>
            </div>
            <div class="exchange-actions exchange-sufficient-actions">
              <button class="exchange-button exchange-button-secondary exchange-cancel" type="button">再想想</button>
              <button class="exchange-button exchange-button-primary exchange-confirm" type="button">确认兑换</button>
            </div>
          </div>

          <div class="exchange-mode exchange-mode-insufficient">
            <h2 class="exchange-insufficient-title">还差 <strong class="exchange-missing-value">15</strong> 颗星星</h2>
            <div class="exchange-preview exchange-insufficient-preview">
              <img class="exchange-preview-image" src="./assets/bag-bookshelf.png" alt="" />
            </div>
            <div class="exchange-details exchange-insufficient-details">
              <div class="exchange-detail-row exchange-price-row">
                <span class="exchange-detail-label exchange-price-label">
                  <img src="./assets/exchange-dialog-star.svg" alt="" aria-hidden="true" />
                  <span>价格</span>
                </span>
                <strong class="exchange-number exchange-price-value">45</strong>
              </div>
              <div class="exchange-detail-row exchange-balance-row">
                <span class="exchange-detail-label">当前有</span>
                <span class="exchange-balance-group">
                  <strong class="exchange-number exchange-balance-value">500</strong>
                  <span>颗星星</span>
                </span>
              </div>
              <div class="exchange-detail-row exchange-plan-row">完成每日学习计划可以获得星星</div>
            </div>
            <div class="exchange-actions exchange-insufficient-actions">
              <button class="exchange-button exchange-button-secondary exchange-cancel" type="button">暂不兑换</button>
              <button class="exchange-button exchange-button-primary exchange-go-plan" type="button">去完成计划</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="./reading-hut-state.js"></script>
    <script src="./reading-hut-placement-motion.js"></script>
    <script src="./reading-hut-exchange.js"></script>
    <script>
      (function () {
        const ITEMS = {
          furniture: [
            { id: 'reading-rug', slot: 'rug',       img: './assets/item-reading-rug-on.png', imgOff: './assets/item-reading-rug-off.png', name: '阅读地毯', stars: 10, unlocked: false, placed: false, newUntil: 0 },
            { id: 'wood-floor',  slot: 'floor',     img: './assets/item-wood-floor-on.png',  imgOff: './assets/item-wood-floor-off.png',  name: '木地板',   stars: 20, unlocked: false, placed: false, newUntil: 0 },
            { id: 'bookshelf',   slot: 'bookshelf', img: './assets/bag-bookshelf.png',       imgOff: './assets/bag-bookshelf-off.png',    name: '小书架',   stars: 45, unlocked: false, placed: false, newUntil: 0 },
          ],
          decoration: [
            { id: 'plant',        slot: 'plant',        img: './assets/item-plant-on.png',        imgOff: './assets/item-plant-off.png',        name: '小绿植',     stars: 10, unlocked: false, placed: false, newUntil: 0 },
            { id: 'star-sticker', slot: 'star-sticker', img: './assets/item-star-sticker-on.png', imgOff: './assets/item-star-sticker-off.png', name: '星星墙贴',   stars: 10, unlocked: false, placed: false, newUntil: 0 },
            { id: 'doll',         slot: 'doll',         img: './assets/item-doll-on.png',         imgOff: './assets/item-doll-off.png',         name: '雪梨玩偶',   stars: 15, unlocked: false, placed: false, newUntil: 0 },
            { id: 'story-wall',   slot: 'story-wall',   img: './assets/item-story-wall-on.png',   imgOff: './assets/item-story-wall-off.png',   name: '故事背景墙', stars: 10, unlocked: false, placed: false, newUntil: 0 },
          ],
        };

        const page = document.querySelector('.hut-page');
        const panel = document.querySelector('.bag-panel');
        const panelBg = document.querySelector('.bag-panel-bg');
        const itemList = document.querySelector('.bag-item-list');
        const overlay = document.querySelector('.bag-overlay');
        const furnitureBtn = document.querySelector('.room-action-bag');
        const decorationsBtn = document.querySelector('.room-action-decorations');
        const closeBtn = document.querySelector('.bag-close');
        const hotspot = document.querySelector('.placement-hotspot');
        const roomTip = document.querySelector('.room-tip');
        const studyTip = document.querySelector('.study-tip');
        const successTip = document.querySelector('.exchange-success-tip');
        const roomStars = document.querySelector('.room-stars');
        const starCount = document.querySelector('.room-star-count');
        const exchangeOverlay = document.querySelector('.exchange-overlay');
        const placementMotionLayer = document.querySelector('.placement-motion-layer');
        const placementTrailPath = document.querySelector('.placement-flight-path');
        const placementParticleCanvas = document.querySelector('.placement-particle-canvas');
        const placementSmokeLayer = document.querySelector('.placement-smoke-layer');
        const dialog = document.querySelector('.exchange-dialog');
        const confirmExchangeBtn = document.querySelector('.exchange-confirm');
        const goPlanBtn = document.querySelector('.exchange-go-plan');
        const { getExchangeOutcome, promoteItemById } = window.ReadingHutExchange;
        const { createDefaultState, load, save, purchaseItem, placeItem } = window.ReadingHutState;
        const { playPlacementMotion } = window.ReadingHutPlacementMotion;
        const DEMO_RESET_ON_LOAD = true;
        const NEW_TAG_DURATION_MS = 5000;
        const newTagTimers = new Map();
        let gameState = DEMO_RESET_ON_LOAD ? save(createDefaultState()) : load();
        let starBalance = gameState.stars;
        let currentExchangeItem = null;
        let currentExchangeCategory = null;
        let currentPlacementItem = null;
        let currentPlacementCategory = null;
        let placementInProgress = false;
        let successTipTimer = null;
        let latestExchangeItemId = null;
        const DRAG_THRESHOLD = 6;
        const dragState = {
          pointerId: null,
          startX: 0,
          startScrollLeft: 0,
          didDrag: false,
          suppressClick: false,
        };

        function renderItems(category) {
          itemList.scrollLeft = 0;
          itemList.innerHTML = '';
          (ITEMS[category] || []).filter(function (item) {
            return !item.placed;
          }).forEach(function (item) {
            var el = document.createElement('button');
            el.className = 'bag-item';
            el.type = 'button';
            el.dataset.audio = 'hut-item-click';
            el.dataset.itemId = item.id || item.name;
            el.dataset.category = category;
            el.dataset.state = item.unlocked ? 'on' : 'off';
            el.setAttribute('role', 'listitem');
            el.setAttribute('aria-label', item.name + ' ' + item.stars + '星');

            var card = document.createElement('div');
            card.className = 'bag-item-card';

            var cardBg = document.createElement('img');
            cardBg.className = 'bag-item-card-bg';
            cardBg.src = './assets/item-card.png';
            cardBg.alt = '';
            cardBg.setAttribute('aria-hidden', 'true');
            card.appendChild(cardBg);

            var thumb = document.createElement('img');
            thumb.className = 'bag-item-thumb';
            thumb.src = item.unlocked ? item.img : item.imgOff;
            thumb.alt = item.name;
            card.appendChild(thumb);

            if (item.newUntil > Date.now()) {
              var newTag = document.createElement('img');
              newTag.className = 'bag-item-new';
              newTag.src = './assets/item-new-tag.png';
              newTag.alt = 'NEW';
              card.appendChild(newTag);
            }

            el.appendChild(card);

            var starRow = document.createElement('div');
            starRow.className = 'bag-item-star-row';

            var itemStarCount = document.createElement('span');
            itemStarCount.className = 'bag-item-star-count';
            itemStarCount.textContent = item.stars;
            starRow.appendChild(itemStarCount);

            var starIcon = document.createElement('img');
            starIcon.className = 'bag-item-star-icon';
            starIcon.src = './assets/item-star-tag.png';
            starIcon.alt = '';
            starIcon.setAttribute('aria-hidden', 'true');
            starRow.appendChild(starIcon);

            card.appendChild(starRow);

            var name = document.createElement('span');
            name.className = 'bag-item-name';
            name.textContent = item.name;
            card.appendChild(name);

            el.appendChild(card);
            itemList.appendChild(el);
          });
        }

        function openPanel(category, animate) {
          const isDecoration = category === 'decoration';
          panelBg.src = isDecoration
            ? './assets/bag-panel-decorative.png'
            : './assets/bag-panel-furniture.png';
          panel.dataset.category = category;
          panel.setAttribute('aria-label', isDecoration ? '装饰列表' : '家具列表');
          panel.setAttribute('aria-hidden', 'false');
          overlay.setAttribute('aria-hidden', 'false');
          renderItems(category);
          if (!animate) {
            page.classList.add('bag-no-transition');
          }
          page.classList.add('bag-open');
          if (!animate) {
            page.offsetHeight;
            page.classList.remove('bag-no-transition');
          }
        }

        function finishItemListDrag(e) {
          if (dragState.pointerId !== e.pointerId) return;
          dragState.suppressClick = e.type === 'pointerup' && dragState.didDrag;
          dragState.pointerId = null;
          itemList.classList.remove('is-dragging');
        }

        itemList.addEventListener('pointerdown', function (e) {
          if (e.button !== 0) return;
          dragState.pointerId = e.pointerId;
          dragState.startX = e.clientX;
          dragState.startScrollLeft = itemList.scrollLeft;
          dragState.didDrag = false;
          dragState.suppressClick = false;
        });

        itemList.addEventListener('pointermove', function (e) {
          if (dragState.pointerId !== e.pointerId) return;
          const deltaX = e.clientX - dragState.startX;
          if (!dragState.didDrag && Math.abs(deltaX) < DRAG_THRESHOLD) return;
          if (!dragState.didDrag) {
            dragState.didDrag = true;
            itemList.setPointerCapture(e.pointerId);
            itemList.classList.add('is-dragging');
          }
          itemList.scrollLeft = dragState.startScrollLeft - deltaX;
          e.preventDefault();
        });

        itemList.addEventListener('pointerup', finishItemListDrag);
        itemList.addEventListener('pointercancel', finishItemListDrag);
        itemList.addEventListener('click', function (e) {
          if (!dragState.suppressClick) return;
          e.preventDefault();
          e.stopPropagation();
          dragState.suppressClick = false;
        }, true);

        function findItem(category, itemId) {
          return (ITEMS[category] || []).find(function (item) {
            return item.id === itemId;
          });
        }

        function syncItemsFromState() {
          Object.keys(ITEMS).forEach(function (category) {
            ITEMS[category].forEach(function (item) {
              const storedItem = gameState.items[item.id];
              item.unlocked = Boolean(storedItem && storedItem.unlocked);
              item.placed = Boolean(storedItem && storedItem.placed);
            });
          });
        }

        function renderPlacementStage() {
          document.querySelectorAll('.placement-slot[data-item-id]').forEach(function (slot) {
            const storedItem = gameState.items[slot.dataset.itemId];
            slot.classList.toggle('is-placed', Boolean(storedItem && storedItem.placed));
          });
        }

        function updateTopStarBalance() {
          starCount.textContent = starBalance;
          roomStars.setAttribute('aria-label', starBalance + ' stars');
        }

        function updateUnlockedCard(item) {
          const card = itemList.querySelector('.bag-item[data-item-id="' + item.id + '"]');
          if (!card) return;
          card.dataset.state = 'on';
          const thumb = card.querySelector('.bag-item-thumb');
          if (thumb) thumb.src = item.img;
        }

        function completePlacement(targetSlot) {
          if (!currentPlacementItem) return;
          const item = currentPlacementItem;
          const category = currentPlacementCategory;
          const result = placeItem(gameState, item.id);
          if (result.ok) {
            gameState = save(result.state);
            syncItemsFromState();
            renderPlacementStage();
            if (panel.dataset.category === category) renderItems(category);
          }
          targetSlot.classList.remove('is-previewing', 'is-settling');
          currentPlacementItem = null;
          currentPlacementCategory = null;
          placementInProgress = false;
        }

        function startPlacement(item, category, card) {
          if (placementInProgress) return;
          const sourceThumb = card.querySelector('.bag-item-thumb');
          const targetSlot = document.querySelector('.placement-slot[data-item-id="' + item.id + '"]');
          if (!sourceThumb || !targetSlot) return;
          const targetVisual = targetSlot.querySelector('.placement-item');

          placementInProgress = true;
          currentPlacementItem = item;
          currentPlacementCategory = category;
          card.classList.add('is-placing');
          playPlacementMotion({
            layer: placementMotionLayer,
            trailPath: placementTrailPath,
            particleCanvas: placementParticleCanvas,
            smokeLayer: placementSmokeLayer,
            sourceElement: sourceThumb,
            targetElement: targetSlot,
            targetVisualElement: targetVisual,
            imageSrc: item.img,
            onImpact: function () {
              targetSlot.classList.add('is-previewing');
            },
          }).then(function () {
            completePlacement(targetSlot);
          }).catch(function () {
            completePlacement(targetSlot);
          }).finally(function () {
            card.classList.remove('is-placing');
          });
        }

        function hideExchangeSuccessTip() {
          if (successTipTimer !== null) {
            window.clearTimeout(successTipTimer);
            successTipTimer = null;
          }
          successTip.classList.remove('is-visible');
          successTip.setAttribute('aria-hidden', 'true');
          latestExchangeItemId = null;
        }

        function showExchangeSuccessTip(category, itemId) {
          if (successTipTimer !== null) window.clearTimeout(successTipTimer);
          const itemType = category === 'decoration' ? '装饰' : '家具';
          latestExchangeItemId = itemId;
          successTip.textContent = '已经兑换成功啦~！快去点击刚刚兑换的' + itemType + '放置吧！';
          successTip.classList.add('is-visible');
          successTip.setAttribute('aria-hidden', 'false');
          successTipTimer = window.setTimeout(function () {
            successTipTimer = null;
            successTip.classList.remove('is-visible');
            successTip.setAttribute('aria-hidden', 'true');
            latestExchangeItemId = null;
          }, NEW_TAG_DURATION_MS);
        }

        function scheduleNewTagExpiry(category, item) {
          const timerKey = category + ':' + item.id;
          const existingTimer = newTagTimers.get(timerKey);
          if (existingTimer !== undefined) window.clearTimeout(existingTimer);

          const remaining = Math.max(0, item.newUntil - Date.now());
          const timer = window.setTimeout(function () {
            item.newUntil = 0;
            newTagTimers.delete(timerKey);
            if (panel.dataset.category !== category) return;
            const card = itemList.querySelector('.bag-item[data-item-id="' + item.id + '"]');
            const newTag = card && card.querySelector('.bag-item-new');
            if (newTag) newTag.remove();
          }, remaining);
          newTagTimers.set(timerKey, timer);
        }

        function populateExchangeDialog(item, outcome) {
          dialog.querySelectorAll('.exchange-item-name').forEach(function (node) {
            node.textContent = item.name;
          });
          dialog.querySelectorAll('.exchange-price-value').forEach(function (node) {
            node.textContent = item.stars;
          });
          dialog.querySelectorAll('.exchange-balance-value').forEach(function (node) {
            node.textContent = starBalance;
          });
          dialog.querySelector('.exchange-remaining-value').textContent = outcome.remaining;
          dialog.querySelector('.exchange-missing-value').textContent = outcome.missing;
          dialog.querySelectorAll('.exchange-preview-image').forEach(function (image) {
            image.src = item.img;
            image.alt = item.name;
          });
        }

        function openExchangeDialog(item, category) {
          currentExchangeItem = item;
          currentExchangeCategory = category;
          const outcome = getExchangeOutcome(starBalance, item.stars);
          dialog.dataset.mode = outcome.canAfford ? 'sufficient' : 'insufficient';
          dialog.setAttribute('aria-label', outcome.canAfford ? '确认兑换' : '星星不足');
          populateExchangeDialog(item, outcome);
          exchangeOverlay.classList.add('is-open');
          exchangeOverlay.setAttribute('aria-hidden', 'false');
          (outcome.canAfford ? confirmExchangeBtn : goPlanBtn).focus();
        }

        function closeExchangeDialog() {
          exchangeOverlay.classList.remove('is-open');
          exchangeOverlay.setAttribute('aria-hidden', 'true');
          currentExchangeItem = null;
          currentExchangeCategory = null;
        }

        itemList.addEventListener('click', function (e) {
          const card = e.target.closest('.bag-item');
          if (!card) return;
          if (card.dataset.itemId === latestExchangeItemId) hideExchangeSuccessTip();
          const item = findItem(card.dataset.category, card.dataset.itemId);
          if (!item) return;
          if (item.unlocked) {
            startPlacement(item, card.dataset.category, card);
            return;
          }
          openExchangeDialog(item, card.dataset.category);
        });

        dialog.querySelectorAll('.exchange-cancel').forEach(function (button) {
          button.addEventListener('click', closeExchangeDialog);
        });

        confirmExchangeBtn.addEventListener('click', function () {
          if (!currentExchangeItem) return;
          const item = currentExchangeItem;
          const category = currentExchangeCategory;
          const outcome = getExchangeOutcome(starBalance, item.stars);
          if (!outcome.canAfford) {
            openExchangeDialog(item, category);
            return;
          }
          const purchase = purchaseItem(gameState, item.id, item.stars);
          if (!purchase.ok) return;
          gameState = save(purchase.state);
          starBalance = gameState.stars;
          syncItemsFromState();
          item.newUntil = Date.now() + NEW_TAG_DURATION_MS;
          updateTopStarBalance();
          updateUnlockedCard(item);
          ITEMS[category] = promoteItemById(ITEMS[category], item.id);
          renderItems(category);
          itemList.scrollLeft = 0;
          scheduleNewTagExpiry(category, item);
          closeExchangeDialog();
          showExchangeSuccessTip(category, item.id);
        });

        goPlanBtn.addEventListener('click', function (e) {
          // This handler stops bubbling, so it must play the delegated UI effect directly.
          try {
            if (window.GameAudioManager && typeof window.GameAudioManager.playEffect === 'function') {
              void window.GameAudioManager.playEffect('ui-click');
            }
          } catch (error) {
            // Audio failures must not interrupt the original interaction.
          }
          e.stopPropagation();
          closeExchangeDialog();
          closeBag();
          roomTip.classList.add('is-hidden');
          studyTip.classList.add('is-visible');
          studyTip.setAttribute('aria-hidden', 'false');
        });

        exchangeOverlay.addEventListener('click', function (e) {
          if (e.target === exchangeOverlay) closeExchangeDialog();
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && exchangeOverlay.classList.contains('is-open')) {
            closeExchangeDialog();
          }
        });

        function closeBag() {
          hideExchangeSuccessTip();
          page.classList.remove('bag-open');
          panel.setAttribute('aria-hidden', 'true');
          overlay.setAttribute('aria-hidden', 'true');
        }

        furnitureBtn.addEventListener('click', function () { openPanel('furniture', true); });
        decorationsBtn.addEventListener('click', function () { openPanel('decoration', true); });
        closeBtn.addEventListener('click', closeBag);
        overlay.addEventListener('click', closeBag);

        hotspot.addEventListener('click', function () {
          roomTip.classList.add('is-hidden');
          studyTip.classList.add('is-visible');
          studyTip.setAttribute('aria-hidden', 'false');
        });

        page.addEventListener('click', function (e) {
          if (studyTip.classList.contains('is-visible') &&
              !studyTip.contains(e.target) &&
              !hotspot.contains(e.target)) {
            studyTip.classList.remove('is-visible');
            studyTip.setAttribute('aria-hidden', 'true');
          }
        });

        syncItemsFromState();
        updateTopStarBalance();
        renderPlacementStage();

        if (new URLSearchParams(location.search).get('bag') === 'open') {
          openPanel('furniture', false);
          history.replaceState(null, '', location.pathname);
        }
      })();
    </script>
  </body>
</html>
