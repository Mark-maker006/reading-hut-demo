<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furniture Bag</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./bag.css" />
  </head>
  <body>
    <main class="bag-page" aria-label="Furniture Bag">
      <section class="placement-stage" aria-label="Furniture placement preview">
        <img class="ghost-bookshelf" src="./assets/bag-bookshelf-disable.png" alt="" aria-hidden="true" />
      </section>

      <img class="mascot" src="./assets/bag-mascot.png" alt="" aria-hidden="true" />

      <img class="room-bg" src="./assets/reading-room-background.png" alt="" aria-hidden="true" />

      <header class="room-topbar" aria-label="Room navigation">
        <a class="room-back" href="./reading-hut.html" aria-label="Back to reading hut">
          <img src="./assets/room-back-button.png" alt="" aria-hidden="true" />
        </a>
        <img class="room-nameplate" src="./assets/room-nameplate.png" alt="Reading Hut" />
        <img class="room-stars" src="./assets/room-stars.png" alt="24 stars" />
      </header>

     
      <section class="bag-panel" aria-label="Furniture list">
        <img class="bag-panel-bg" src="./assets/bag-panel.png" alt="" aria-hidden="true" />
        <a class="bag-card bag-card-bookshelf" href="./placement-video.html" aria-label="Play bookshelf placement animation">
          <img class="card-item bookshelf-item" src="./assets/bag-bookshelf.png" alt="" aria-hidden="true" />
        </a>
      </section>
    </main>
  </body>
</html>
