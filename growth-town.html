<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习成长小镇 - 交互 Demo</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./growth-town.css" />
  </head>
  <body>
    <main class="demo-phone" aria-label="学习成长小镇交互 Demo">
      <img class="screen-art" src="./assets/growth-town-reference.png" alt="学习成长小镇页面截图" />

      <a class="hotspot map-entry" href="./level-map.html" aria-label="查看关卡地图全貌"></a>
      <button class="hotspot stage-locked" type="button" data-action="locked" aria-label="故事城堡未解锁"></button>
      <a class="hotspot tab-plan" href="./index.html" aria-label="返回计划首页"></a>

      <div class="toast" role="status" aria-live="polite"></div>

      <dialog class="enter-dialog" aria-labelledby="enter-title">
        <button class="dialog-close" type="button" aria-label="关闭">×</button>
        <h2 id="enter-title">进入阅读小屋</h2>
        <p>准备开始当前关卡，完成后可获得星星 +10 和书签 +1。</p>
        <button class="dialog-primary" type="button">开始体验</button>
      </dialog>
    </main>

    <script>
      const toast = document.querySelector(".toast");
      const dialog = document.querySelector(".enter-dialog");
      let toastTimer = 0;

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("is-visible");
        toastTimer = window.setTimeout(() => {
          toast.classList.remove("is-visible");
        }, 1800);
      }

      document.querySelectorAll("[data-action='enter']").forEach((node) => {
        node.addEventListener("click", () => {
          if (typeof dialog.showModal === "function") {
            dialog.showModal();
          } else {
            showToast("进入阅读小屋");
          }
        });
      });

      document.querySelector("[data-action='locked']").addEventListener("click", () => {
        showToast("完成当前关卡后解锁");
      });

      document.querySelector(".dialog-close").addEventListener("click", () => dialog.close());
      document.querySelector(".dialog-primary").addEventListener("click", () => {
        dialog.close();
        showToast("已进入阅读小屋");
      });
    </script>
  </body>
</html>
